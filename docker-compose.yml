version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    command: python src/api.py
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - qdrant
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data

  streamlit:
    build: .
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

volumes:
  qdrant_data:
